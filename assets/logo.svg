<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- 金属银灰 -->
    <linearGradient id="metal-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="40%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>

    <!-- 深灰暗部 -->
    <linearGradient id="metal-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#505050"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>

    <!-- 霓虹绿 -->
    <linearGradient id="neon-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff00"/>
      <stop offset="100%" stop-color="#00cc00"/>
    </linearGradient>

    <!-- 霓虹紫/粉 -->
    <linearGradient id="neon-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff0080"/>
      <stop offset="100%" stop-color="#cc0066"/>
    </linearGradient>

    <!-- 眼睛蓝光 -->
    <radialGradient id="eye-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="80%" stop-color="#0088ff"/>
      <stop offset="100%" stop-color="#0044aa"/>
    </radialGradient>
  </defs>

  <!-- 背景透明 -->
  <rect width="1024" height="1024" fill="none"/>

  <!-- 头骨主体轮廓 -->
  <g id="skull">
    <!-- 头颅底色 -->
    <ellipse cx="512" cy="480" rx="240" ry="280" fill="url(#metal-silver)" stroke="url(#neon-green)" stroke-width="6"/>

    <!-- 头颅暗部（立体感） -->
    <ellipse cx="512" cy="480" rx="240" ry="280" fill="url(#metal-dark)" opacity="0.35"/>

    <!-- 左眼窝 - 锐角菱形 -->
    <g>
      <path d="M 340 380 L 280 420 L 320 500 L 380 460 Z" fill="#0a0a0a" stroke="url(#neon-pink)" stroke-width="4" stroke-linejoin="miter"/>
      <!-- 眼球 -->
      <ellipse cx="330" cy="430" rx="45" ry="55" fill="url(#eye-glow)"/>
      <!-- 瞳孔 -->
      <circle cx="330" cy="440" r="22" fill="#000000"/>
      <!-- 高光 -->
      <circle cx="320" cy="420" r="10" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- 右眼窝 - 锐角菱形 -->
    <g>
      <path d="M 684 380 L 744 420 L 704 500 L 644 460 Z" fill="#0a0a0a" stroke="url(#neon-pink)" stroke-width="4" stroke-linejoin="miter"/>
      <!-- 眼球 -->
      <ellipse cx="694" cy="430" rx="45" ry="55" fill="url(#eye-glow)"/>
      <!-- 瞳孔 -->
      <circle cx="694" cy="440" r="22" fill="#000000"/>
      <!-- 高光 -->
      <circle cx="704" cy="420" r="10" fill="#ffffff" opacity="0.85"/>
    </g>

    <!-- 左耳尖 -->
    <path d="M 280 300 L 220 200 L 260 280 Z" fill="url(#metal-silver)" stroke="url(#neon-green)" stroke-width="3" stroke-linejoin="miter"/>

    <!-- 右耳尖 -->
    <path d="M 744 300 L 804 200 L 764 280 Z" fill="url(#metal-silver)" stroke="url(#neon-green)" stroke-width="3" stroke-linejoin="miter"/>

    <!-- 鼻孔 - 菱形 -->
    <path d="M 512 490 L 490 520 L 512 550 L 534 520 Z" fill="#0a0a0a" stroke="url(#neon-green)" stroke-width="3"/>

    <!-- 上颌牙齿 -->
    <g stroke="url(#neon-green)" stroke-width="5" stroke-linecap="round" fill="none">
      <line x1="280" y1="610" x2="300" y2="625"/>
      <line x1="330" y1="635" x2="365" y2="635"/>
      <line x1="385" y1="635" x2="420" y2="635"/>
      <line x1="440" y1="635" x2="475" y2="635"/>
      <line x1="495" y1="637" x2="530" y2="635"/>
      <line x1="550" y1="635" x2="585" y2="635"/>
      <line x1="605" y1="635" x2="640" y2="635"/>
      <line x1="660" y1="635" x2="695" y2="635"/>
      <line x1="715" y1="625" x2="745" y2="610"/>
    </g>

    <!-- 下颌线 -->
    <path d="M 260 610 Q 512 720 764 610" stroke="url(#neon-pink)" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- 下颌獠牙 - 左 -->
    <path d="M 350 720 L 340 820" stroke="url(#neon-pink)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <polygon points="340,820 330,835 350,830" fill="url(#neon-pink)"/>

    <!-- 下颌獠牙 - 右 -->
    <path d="M 674 720 L 684 820" stroke="url(#neon-pink)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <polygon points="684,820 694,835 674,830" fill="url(#neon-pink)"/>

    <!-- 下排牙齿 -->
    <g stroke="url(#neon-pink)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8">
      <line x1="310" y1="680" x2="330" y2="700"/>
      <line x1="360" y1="710" x2="395" y2="710"/>
      <line x1="415" y1="710" x2="450" y2="710"/>
      <line x1="470" y1="710" x2="505" y2="710"/>
      <line x1="525" y1="712" x2="560" y2="710"/>
      <line x1="580" y1="710" x2="615" y2="710"/>
      <line x1="635" y1="710" x2="670" y2="710"/>
      <line x1="690" y1="700" x2="715" y2="680"/>
    </g>
  </g>

  <!-- 装饰：头顶尖刺 -->
  <g stroke="url(#neon-green)" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="512" y1="180" x2="512" y2="80"/>
    <line x1="430" y1="220" x2="380" y2="120"/>
    <line x1="594" y1="220" x2="644" y2="120"/>
  </g>

  <!-- 霓虹光晕 -->
  <circle cx="512" cy="512" r="520" fill="none" stroke="url(#neon-green)" stroke-width="1" opacity="0.1"/>
  <circle cx="512" cy="512" r="550" fill="none" stroke="url(#neon-pink)" stroke-width="1" opacity="0.08"/>
</svg>
