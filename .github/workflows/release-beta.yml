name: Release (Beta)

on:
  workflow_dispatch:

concurrency:
  group: release-beta
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Skip on bot bump commits
        id: check
        run: |
          MSG=$(git log -1 --pretty=%s)
          if [[ "$MSG" == "Bump BETA_VERSION to "* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: macos-26
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
      build_number: ${{ steps.validate.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute beta version
        id: validate
        run: |
          BETA_BASE=$(cat BETA_VERSION | tr -d '[:space:]')
          if ! [[ "$BETA_BASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: BETA_VERSION must be X.Y.Z, got '$BETA_BASE'"
            exit 1
          fi
          BUILD_NUMBER=$(git rev-list --count HEAD)
          VERSION="${BETA_BASE}-beta.${BUILD_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    runs-on: macos-26
    strategy:
      matrix:
        arch: [arm64, x86_64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GhosttyKit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          chmod +x scripts/setup.sh
          scripts/setup.sh

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-release-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-release-${{ runner.os }}-${{ matrix.arch }}-

      - name: Resolve Sparkle dependency
        run: swift package resolve

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Resolve signing identity
        id: identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "Error: No Developer ID Application certificate found"
            exit 1
          fi
          echo "name=$IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Derive Sparkle public key
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_PUBLIC_KEY=$(swift scripts/derive-sparkle-public-key.swift "$SPARKLE_PRIVATE_KEY")
          echo "public_key=$SPARKLE_PUBLIC_KEY" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x scripts/build-release.sh scripts/create-icns.sh
          scripts/build-release.sh \
            --arch "${{ matrix.arch }}" \
            --version "${{ needs.validate.outputs.version }}" \
            --sign-identity "${{ steps.identity.outputs.name }}" \
            --sparkle-public-key "${{ steps.sparkle.outputs.public_key }}" \
            --sparkle-feed-url "https://github.com/muxy-app/muxy/releases/download/beta-channel/appcast-beta-${{ matrix.arch }}.xml"

      - name: Upload dSYM to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [[ -z "${SENTRY_AUTH_TOKEN:-}" ]]; then
            echo "SENTRY_AUTH_TOKEN is not set; skipping Sentry dSYM upload"
            exit 0
          fi
          npm install --global @sentry/cli
          sentry-cli debug-files upload \
            --org muxy-4d \
            --project muxy-desktop \
            "build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.app.dSYM"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          set +e
          submit_output=$(xcrun notarytool submit \
            "build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.dmg" \
            --keychain-profile "notary-profile" \
            --wait \
            --output-format json)
          submit_status=$?
          echo "$submit_output"
          submission_id=$(echo "$submit_output" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
          xcrun notarytool log "$submission_id" --keychain-profile "notary-profile" || true
          set -e
          if [ "$submit_status" -ne 0 ]; then exit "$submit_status"; fi
          xcrun stapler staple \
            "build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.dmg
            build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.app.dSYM

  release:
    needs: [validate, build]
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Sparkle dependency
        run: swift package resolve

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Fetch previous beta appcasts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prev
          for ARCH in arm64 x86_64; do
            URL="https://github.com/muxy-app/muxy/releases/download/beta-channel/appcast-beta-${ARCH}.xml"
            if curl -fsSL "$URL" -o "prev/appcast-beta-${ARCH}.xml"; then
              echo "Fetched previous beta appcast for $ARCH"
            else
              echo "No previous beta appcast for $ARCH (first beta)"
              rm -f "prev/appcast-beta-${ARCH}.xml"
            fi
          done

      - name: Generate Sparkle appcasts
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          CHANNEL: beta
        run: |
          chmod +x scripts/generate-appcast.sh
          for ARCH in arm64 x86_64; do
            EXISTING=""
            if [[ -f "prev/appcast-beta-${ARCH}.xml" ]]; then
              EXISTING="prev/appcast-beta-${ARCH}.xml"
            fi
            EXISTING_APPCAST="$EXISTING" scripts/generate-appcast.sh \
              "artifacts/dmg-${ARCH}/Muxy-${{ needs.validate.outputs.version }}-${ARCH}.dmg" \
              "${{ needs.validate.outputs.tag }}" \
              "${{ needs.validate.outputs.build_number }}" \
              "appcast-beta-${ARCH}.xml"
          done

      - name: Create per-build prerelease (DMGs)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              --clobber \
              artifacts/dmg-arm64/*.dmg \
              artifacts/dmg-x86_64/*.dmg
          else
            PREVIOUS_BETA=$(gh release list --repo "${{ github.repository }}" --limit 100 \
              --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease and (.tagName | contains("-beta.")))][0].tagName' || echo "")
            NOTES_ARGS=(--generate-notes)
            if [[ -n "$PREVIOUS_BETA" && "$PREVIOUS_BETA" != "$TAG" ]]; then
              NOTES_ARGS+=(--notes-start-tag "$PREVIOUS_BETA")
            fi
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Muxy ${{ needs.validate.outputs.version }}" \
              --prerelease \
              "${NOTES_ARGS[@]}" \
              artifacts/dmg-arm64/*.dmg \
              artifacts/dmg-x86_64/*.dmg
          fi

      - name: Publish rolling beta-channel appcast release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view beta-channel --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload beta-channel \
              --repo "${{ github.repository }}" \
              --clobber \
              appcast-beta-arm64.xml appcast-beta-x86_64.xml
          else
            gh release create beta-channel \
              --repo "${{ github.repository }}" \
              --title "Beta Channel Appcast" \
              --notes "Rolling Sparkle appcast for the beta channel. Do not delete." \
              --prerelease \
              appcast-beta-arm64.xml appcast-beta-x86_64.xml
          fi

      - name: Notify Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping Discord notification"
            exit 0
          fi
          NOTES=$(gh release view "$TAG" --repo "$REPO" --json body --jq .body \
            | sed -E 's# by @[A-Za-z0-9_-]+ in https://github\.com/[^ ]+/pull/[0-9]+##g')
          if [[ ${#NOTES} -gt 3800 ]]; then
            NOTES="${NOTES:0:3800}…"
          fi
          URL="https://github.com/${REPO}/releases/tag/${TAG}"
          PAYLOAD=$(jq -n \
            --arg title "Muxy ${VERSION} (beta) released" \
            --arg url "$URL" \
            --arg notes "$NOTES" \
            --arg footer "Beta channel" \
            '{
              username: "Muxy Releases",
              embeds: [{
                title: $title,
                url: $url,
                description: $notes,
                color: 15844367,
                footer: { text: $footer },
                timestamp: (now | todate)
              }]
            }')
          if ! curl -fsSL -H "Content-Type: application/json" \
            -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"; then
            echo "Discord notification failed; release succeeded regardless"
          fi
