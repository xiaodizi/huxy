name: Release

on:
  workflow_dispatch:
    inputs:
      from_beta_tag:
        description: "Beta tag to promote to stable (e.g. v0.26.0-beta.42)"
        required: true
        type: string
      version:
        description: "Stable version to release (X.Y.Z)"
        required: true
        type: string
      next_beta_version:
        description: "Version that beta builds should target after this release (X.Y.Z) — written to BETA_VERSION"
        required: true
        type: string

jobs:
  validate:
    runs-on: macos-26
    outputs:
      version: ${{ steps.validate.outputs.version }}
      next_beta_version: ${{ steps.validate.outputs.next_beta_version }}
      build_number: ${{ steps.validate.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        id: validate
        run: |
          VERSION="${{ inputs.version }}"
          NEXT="${{ inputs.next_beta_version }}"
          BETA_TAG="${{ inputs.from_beta_tag }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be in X.Y.Z format"
            exit 1
          fi
          if ! [[ "$NEXT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: next_beta_version must be in X.Y.Z format"
            exit 1
          fi
          if ! [[ "$BETA_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Error: from_beta_tag must look like vX.Y.Z-beta.N"
            exit 1
          fi
          if ! git rev-parse "$BETA_TAG" >/dev/null 2>&1; then
            echo "Error: tag $BETA_TAG not found"
            exit 1
          fi
          BUILD_NUMBER=$(git rev-list --count "$BETA_TAG")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "next_beta_version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    runs-on: macos-26
    strategy:
      matrix:
        arch: [arm64, x86_64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.from_beta_tag }}

      - name: Setup GhosttyKit
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          chmod +x scripts/setup.sh
          scripts/setup.sh

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-release-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-release-${{ runner.os }}-${{ matrix.arch }}-

      - name: Resolve Sparkle dependency
        run: swift package resolve

      - name: Install create-dmg
        run: npm install --global create-dmg

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Resolve signing identity
        id: identity
        run: |
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "Error: No Developer ID Application certificate found"
            exit 1
          fi
          echo "name=$IDENTITY" >> "$GITHUB_OUTPUT"

      - name: Derive Sparkle public key
        id: sparkle
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_PUBLIC_KEY=$(swift scripts/derive-sparkle-public-key.swift "$SPARKLE_PRIVATE_KEY")
          echo "public_key=$SPARKLE_PUBLIC_KEY" >> "$GITHUB_OUTPUT"

      - name: Build and package
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          chmod +x scripts/build-release.sh scripts/create-icns.sh
          scripts/build-release.sh \
            --arch "${{ matrix.arch }}" \
            --version "${{ needs.validate.outputs.version }}" \
            --sign-identity "${{ steps.identity.outputs.name }}" \
            --sparkle-public-key "${{ steps.sparkle.outputs.public_key }}" \
            --sparkle-feed-url "https://github.com/muxy-app/muxy/releases/latest/download/appcast-${{ matrix.arch }}.xml"

      - name: Upload dSYM to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [[ -z "${SENTRY_AUTH_TOKEN:-}" ]]; then
            echo "SENTRY_AUTH_TOKEN is not set; skipping Sentry dSYM upload"
            exit 0
          fi
          npm install --global @sentry/cli
          sentry-cli debug-files upload \
            --org muxy-4d \
            --project muxy-desktop \
            "build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.app.dSYM"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"
          set +e
          submit_output=$(xcrun notarytool submit \
            "build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.dmg" \
            --keychain-profile "notary-profile" \
            --wait \
            --output-format json)
          submit_status=$?
          echo "$submit_output"
          submission_id=$(echo "$submit_output" | python3 -c 'import sys, json; print(json.load(sys.stdin)["id"])')
          xcrun notarytool log "$submission_id" --keychain-profile "notary-profile" || true
          set -e
          if [ "$submit_status" -ne 0 ]; then exit "$submit_status"; fi
          xcrun stapler staple \
            "build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.dmg
            build/Muxy-${{ needs.validate.outputs.version }}-${{ matrix.arch }}.app.dSYM

  release:
    needs: [validate, build]
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.from_beta_tag }}
          token: ${{ secrets.GH_RELEASE_PAT }}

      - name: Resolve Sparkle dependency
        run: swift package resolve

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Fetch previous stable appcasts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prev
          for ARCH in arm64 x86_64; do
            URL="https://github.com/muxy-app/muxy/releases/latest/download/appcast-${ARCH}.xml"
            if curl -fsSL "$URL" -o "prev/appcast-${ARCH}.xml"; then
              echo "Fetched previous stable appcast for $ARCH"
            else
              echo "No previous stable appcast for $ARCH (first release)"
              rm -f "prev/appcast-${ARCH}.xml"
            fi
          done

      - name: Generate Sparkle appcasts
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          CHANNEL: stable
        run: |
          chmod +x scripts/generate-appcast.sh
          for ARCH in arm64 x86_64; do
            EXISTING=""
            if [[ -f "prev/appcast-${ARCH}.xml" ]]; then
              EXISTING="prev/appcast-${ARCH}.xml"
            fi
            EXISTING_APPCAST="$EXISTING" scripts/generate-appcast.sh \
              "artifacts/dmg-${ARCH}/Muxy-${{ needs.validate.outputs.version }}-${ARCH}.dmg" \
              "v${{ needs.validate.outputs.version }}" \
              "${{ needs.validate.outputs.build_number }}" \
              "appcast-${ARCH}.xml"
          done
          cp appcast-arm64.xml appcast.xml

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.validate.outputs.version }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              --clobber \
              artifacts/dmg-arm64/*.dmg \
              artifacts/dmg-x86_64/*.dmg \
              appcast-arm64.xml \
              appcast-x86_64.xml \
              appcast.xml
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Muxy $TAG" \
              --generate-notes \
              artifacts/dmg-arm64/*.dmg \
              artifacts/dmg-x86_64/*.dmg \
              appcast-arm64.xml \
              appcast-x86_64.xml \
              appcast.xml
          fi

      - name: Bump BETA_VERSION
        env:
          NEXT: ${{ needs.validate.outputs.next_beta_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          echo "$NEXT" > BETA_VERSION
          git add BETA_VERSION
          if git diff --cached --quiet; then
            echo "BETA_VERSION already at $NEXT, nothing to commit"
            exit 0
          fi
          git commit -m "Bump BETA_VERSION to $NEXT"
          git push origin main

      - name: Notify Discord
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK_URL" ]]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping Discord notification"
            exit 0
          fi
          TAG="v${VERSION}"
          NOTES=$(gh release view "$TAG" --repo "$REPO" --json body --jq .body \
            | sed -E 's# by @[A-Za-z0-9_-]+ in https://github\.com/[^ ]+/pull/[0-9]+##g')
          if [[ ${#NOTES} -gt 3800 ]]; then
            NOTES="${NOTES:0:3800}…"
          fi
          URL="https://github.com/${REPO}/releases/tag/${TAG}"
          PAYLOAD=$(jq -n \
            --arg title "Muxy ${TAG} released" \
            --arg url "$URL" \
            --arg notes "$NOTES" \
            --arg footer "Stable channel" \
            '{
              username: "Muxy Releases",
              embeds: [{
                title: $title,
                url: $url,
                description: $notes,
                color: 3066993,
                footer: { text: $footer },
                timestamp: (now | todate)
              }]
            }')
          if ! curl -fsSL -H "Content-Type: application/json" \
            -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"; then
            echo "Discord notification failed; release succeeded regardless"
          fi

  update-homebrew-tap:
    needs: [validate, release]
    runs-on: macos-26
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute SHA256 checksums
        id: sha256
        run: |
          ARM64_SHA=$(shasum -a 256 artifacts/dmg-arm64/Muxy-${{ needs.validate.outputs.version }}-arm64.dmg | awk '{print $1}')
          X86_64_SHA=$(shasum -a 256 artifacts/dmg-x86_64/Muxy-${{ needs.validate.outputs.version }}-x86_64.dmg | awk '{print $1}')
          echo "arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          SHA256_ARM64: ${{ steps.sha256.outputs.arm64 }}
          SHA256_X86_64: ${{ steps.sha256.outputs.x86_64 }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/muxy-app/homebrew-tap.git tap
          mkdir -p tap/Casks
          cat > tap/Casks/muxy.rb <<EOF
          cask "muxy" do
            version "${VERSION}"

            on_arm do
              sha256 "${SHA256_ARM64}"
              url "https://github.com/muxy-app/muxy/releases/download/v#{version}/Muxy-#{version}-arm64.dmg"
            end

            on_intel do
              sha256 "${SHA256_X86_64}"
              url "https://github.com/muxy-app/muxy/releases/download/v#{version}/Muxy-#{version}-x86_64.dmg"
            end

            name "Muxy"
            desc "Terminal multiplexer for macOS"
            homepage "https://github.com/muxy-app/muxy"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Muxy.app"

            zap trash: [
              "~/Library/Application Support/Muxy",
              "~/Library/Preferences/app.muxy.Muxy.plist",
              "~/Library/Saved Application State/app.muxy.Muxy.savedState",
            ]
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/muxy.rb
          git commit -m "Update Muxy to v${VERSION}"
          git push
