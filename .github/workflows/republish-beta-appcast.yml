name: Republish Beta Appcast

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Beta tag to (re)publish into the appcast (e.g. v0.27.0-beta.461)"
        required: true
        type: string

jobs:
  republish:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate input
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "Error: tag must look like vX.Y.Z-beta.N"
            exit 1
          fi
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Error: release $TAG not found"
            exit 1
          fi
          BUILD_NUMBER="${TAG##*-beta.}"
          VERSION="${TAG#v}"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: spm-republish-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-republish-${{ runner.os }}-

      - name: Resolve Sparkle dependency
        run: swift package resolve

      - name: Download DMGs from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          mkdir -p artifacts
          for ARCH in arm64 x86_64; do
            gh release download "$TAG" \
              --repo "${{ github.repository }}" \
              --pattern "Muxy-${VERSION}-${ARCH}.dmg" \
              --dir "artifacts"
          done

      - name: Fetch existing beta appcasts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prev
          for ARCH in arm64 x86_64; do
            URL="https://github.com/${{ github.repository }}/releases/download/beta-channel/appcast-beta-${ARCH}.xml"
            if curl -fsSL "$URL" -o "prev/appcast-beta-${ARCH}.xml"; then
              echo "Fetched previous beta appcast for $ARCH"
            else
              echo "No previous beta appcast for $ARCH"
              rm -f "prev/appcast-beta-${ARCH}.xml"
            fi
          done

      - name: Generate Sparkle appcasts
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          CHANNEL: beta
          TAG: ${{ inputs.tag }}
          VERSION: ${{ steps.validate.outputs.version }}
          BUILD_NUMBER: ${{ steps.validate.outputs.build_number }}
        run: |
          chmod +x scripts/generate-appcast.sh
          for ARCH in arm64 x86_64; do
            EXISTING=""
            if [[ -f "prev/appcast-beta-${ARCH}.xml" ]]; then
              EXISTING="prev/appcast-beta-${ARCH}.xml"
            fi
            EXISTING_APPCAST="$EXISTING" scripts/generate-appcast.sh \
              "artifacts/Muxy-${VERSION}-${ARCH}.dmg" \
              "$TAG" \
              "$BUILD_NUMBER" \
              "appcast-beta-${ARCH}.xml"
          done

      - name: Upload appcasts to beta-channel release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view beta-channel --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload beta-channel \
              --repo "${{ github.repository }}" \
              --clobber \
              appcast-beta-arm64.xml appcast-beta-x86_64.xml
          else
            gh release create beta-channel \
              --repo "${{ github.repository }}" \
              --title "Beta Channel Appcast" \
              --notes "Rolling Sparkle appcast for the beta channel. Do not delete." \
              --prerelease \
              appcast-beta-arm64.xml appcast-beta-x86_64.xml
          fi
